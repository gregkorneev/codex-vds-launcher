name: Cleanup Old Beta 1 Release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/retag-beta1.yml'

permissions:
  contents: write

jobs:
  cleanup-old-beta1:
    name: Delete old v1.1.0-beta.1 release
    runs-on: ubuntu-latest
    steps:
      - name: Delete old release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OLD_RELEASE_ID: '350453267'
        run: |
          gh release delete v1.1.0-beta.1 --yes --cleanup-tag || true
          gh api -X DELETE "repos/${REPO}/releases/${OLD_RELEASE_ID}" || true
          gh api -X DELETE "repos/${REPO}/git/refs/tags/v1.1.0-beta.1" || true
