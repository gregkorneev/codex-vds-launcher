name: Developer Beta Release

on:
  push:
    tags:
      - 'v*-beta.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Build macOS app
        run: npm run dist:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check sources
        run: npm run check

      - name: Build Windows app
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*win-x64.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub pre-release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: Codex VDS Launcher Developer Beta 3
        run: |
          cat > release-notes.md <<'EOF'
            ## English

            Developer Beta 3 for Codex VDS Launcher.

            Highlights:
            - Reduced empty spacing around collapsed sections in the sidebar and right panel.
            - Diagnostics now use the same collapsible section pattern as Server Status.
            - First-launch onboarding and help now explain how to install Codex CLI on a VDS and connect through the app.
            - `codex-vpn` is documented as an optional custom wrapper, not something new users need.
            - macOS release downloads now include only the `.dmg` installer.
            - Windows x64 `.exe` installer is now built for the release.

            Notes:
            - This is a pre-release for manual testing.
            - The macOS app is ad-hoc signed and not notarized.
            - Configure your own SSH alias in `~/.ssh/config` before starting sessions.
            - Install Codex CLI on the VDS first, then keep `codexCommand` as `codex` for normal use.

            ## Русский

            Developer Beta 3 для Codex VDS Launcher.

            Главное:
            - Уменьшено пустое место вокруг свёрнутых секций в боковой и правой панели.
            - «Диагностика» теперь оформлена как раскрывающаяся секция, как «Статус сервера».
            - Приветственный экран и справка объясняют, как установить Codex CLI на VDS и подключиться через приложение.
            - `codex-vpn` описан как необязательная пользовательская обёртка, а не обязательный путь для новых пользователей.
            - Для macOS в релизных загрузках остаётся только `.dmg`.
            - Для Windows теперь собирается x64 `.exe` installer.

            Примечания:
            - Это pre-release для ручного тестирования.
            - macOS-приложение подписано ad-hoc и не notarized.
            - Перед запуском сессий настройте свой SSH alias в `~/.ssh/config`.
            - Сначала установите Codex CLI на VDS, затем для обычной работы оставьте `codexCommand` равным `codex`.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --prerelease
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --prerelease
          fi

          for asset in $(gh release view "$RELEASE_TAG" --json assets -q '.assets[].name' || true); do
            gh release delete-asset "$RELEASE_TAG" "$asset" -y || true
          done

          mapfile -d '' assets < <(find release-assets -type f \( -name '*.dmg' -o -name '*win-x64.exe' \) -print0)
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
