name: Release Builds

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG, ZIP and metadata
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and test
        run: |
          npm run check
          npm test

      - name: Build macOS release artifacts
        run: npm run dist:mac

      - name: Verify ad-hoc signature
        run: |
          app_path="$(find dist -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict "$app_path"
          codesign -dv --verbose=4 "$app_path" 2>&1 | tee codesign.txt
          grep -Eq 'Signature=adhoc|TeamIdentifier=not set' codesign.txt

      - name: Verify macOS artifacts
        run: |
          version="$(node -p "require('./package.json').version")"
          channel="$([[ "$version" == *-* ]] && echo beta || echo latest)"
          test -n "$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.zip' -print -quit)"
          test -f "dist/${channel}-mac.yml"
          grep -F "version: ${version}" "dist/${channel}-mac.yml"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows installer and metadata
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check and test
        run: |
          npm run check
          npm test

      - name: Build Windows release artifacts
        run: npm run dist:win

      - name: Verify Windows artifacts
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          channel="$([[ "$version" == *-* ]] && echo beta || echo latest)"
          test -n "$(find dist -maxdepth 1 -name '*win-x64.exe' -print -quit)"
          test -f "dist/${channel}.yml"
          grep -F "version: ${version}" "dist/${channel}.yml"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/*win-x64.exe
            dist/*.yml
          if-no-files-found: error
