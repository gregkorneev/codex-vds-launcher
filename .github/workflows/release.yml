name: Developer Beta Release

on:
  push:
    tags:
      - 'v*-beta.*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG, ZIP and metadata
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and test
        run: |
          npm run check
          npm test

      - name: Build macOS production artifacts
        run: npm run dist:mac

      - name: Verify ad-hoc signature
        run: |
          app_path="$(find dist -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict "$app_path"
          codesign -dv --verbose=4 "$app_path" 2>&1 | tee codesign.txt
          grep -Eq 'Signature=adhoc|TeamIdentifier=not set' codesign.txt

      - name: Verify macOS artifacts
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.zip' -print -quit)"
          test -f dist/beta-mac.yml
          grep -Eq '^version:[[:space:]]+1\.0\.0-beta\.6$' dist/beta-mac.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist/*.dmg
            dist/*.zip
            dist/beta-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows installer and metadata
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check and test
        run: |
          npm run check
          npm test

      - name: Build Windows production artifacts
        run: npm run dist:win

      - name: Verify Windows artifacts
        shell: bash
        run: |
          test -n "$(find dist -maxdepth 1 -name '*win-x64.exe' -print -quit)"
          test -f dist/beta.yml
          grep -Eq '^version:[[:space:]]+1\.0\.0-beta\.6$' dist/beta.yml

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/*win-x64.exe
            dist/beta.yml
          if-no-files-found: error

  publish-release:
    name: Publish and verify GitHub pre-release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: Codex CLI Launcher Developer Beta 6
        run: |
          cat > release-notes.md <<'EOF'
          ## Русский

          Codex VDS Launcher теперь называется **Codex CLI Launcher**. Developer Beta 6 делает два режима работы явными и упрощает навигацию.

          Главное:
          - В «Настройках» появился переключатель «На этом компьютере / На VDS через SSH».
          - В локальном режиме показываются только локальные проекты; конфигурация VDS и карточки статуса сервера скрыты.
          - При добавлении проекта выбор папки автоматически соответствует текущему режиму.
          - Быстрые промпты и команды объединены в один сворачиваемый раздел «Быстрые действия».
          - «Проекты», «Обновления», «Локальные MD» и «Быстрые действия» сворачиваются, показывают стрелку и запоминают состояние.
          - Приветственный экран объясняет оба режима и показывает изменения текущей версии после каждого обновления.
          - Артефакты и интерфейс используют новое название Codex CLI Launcher.

          ## English

          Codex VDS Launcher is now **Codex CLI Launcher**. Developer Beta 6 makes both working modes explicit and simplifies navigation.

          Highlights:
          - A new Settings switch selects “On this computer” or “On a VDS over SSH”.
          - Local mode shows only local projects and hides VDS configuration and server-status cards.
          - Adding a project automatically uses the folder picker for the selected mode.
          - Quick prompts and commands are combined into one collapsible Quick actions section.
          - Projects, Updates, Local MD, and Quick actions are collapsible, show an arrow, and remember their state.
          - The welcome screen explains both modes and shows the current version changes after every update.
          - Artifacts and the interface now use the Codex CLI Launcher name.

          This is a prerelease. The macOS app is ad-hoc signed and is not notarized.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --prerelease
            gh release view "$RELEASE_TAG" --json assets -q '.assets[].name' | while IFS= read -r asset; do
              test -z "$asset" || gh release delete-asset "$RELEASE_TAG" "$asset" -y
            done
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --prerelease
          fi
          mapfile -d '' assets < <(find release-assets -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*win-x64.exe' -o -name 'beta-mac.yml' -o -name 'beta.yml' \) -print0)
          test "${#assets[@]}" -eq 5
          gh release upload "$RELEASE_TAG" "${assets[@]}"

      - name: Verify published beta channel
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease -q .isPrerelease)" = true
          assets="$(gh release view "$RELEASE_TAG" --json assets -q '.assets[].name')"
          grep -Fx 'beta-mac.yml' <<< "$assets"
          grep -Fx 'beta.yml' <<< "$assets"
          test "$(grep -Ec '\.blockmap$' <<< "$assets")" -eq 0

          metadata_dir="$(mktemp -d)"
          gh release download "$RELEASE_TAG" -p beta-mac.yml -p beta.yml -D "$metadata_dir"
          grep -Eq '^version:[[:space:]]+1\.0\.0-beta\.6$' "$metadata_dir/beta-mac.yml"
          grep -Eq '^version:[[:space:]]+1\.0\.0-beta\.6$' "$metadata_dir/beta.yml"

          latest_stable="$(gh api "repos/$GH_REPO/releases/latest" --jq .tag_name 2>/dev/null || true)"
          test "$latest_stable" != "$RELEASE_TAG"
